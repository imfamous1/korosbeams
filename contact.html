<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex"/>
<meta http-equiv="refresh" content="0;url=/contact/"/>
<link rel="canonical" href="/contact/"/>
<title>Переадресация</title>
<script>
(function () {
  var target = "/contact/";
  if (window.location.search && target.indexOf("?") === -1) target += window.location.search;
  if (window.location.hash && target.indexOf("#") === -1) target += window.location.hash;
  window.location.replace(target);
})();
</script>
</head>
<body>
<p>Страница переехала: <a href="/contact/">/contact/</a></p>
</body>
</html>
